<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#c4382d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="日语笔记">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>日语学习笔记本 · Nihongo Notebook</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <link rel="apple-touch-icon" href="assets/icon-apple-touch.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="brand">
        <div class="seal-wrap">
          <div class="seal">学</div>
          <img class="mascot" src="assets/mimi.png" alt="mimi">
        </div>
        <div class="brand-text">
          <h1>日语学习笔记本</h1>
          <div class="sub">NIHONGO NOTEBOOK</div>
        </div>
      </div>
      <div class="header-right">
        <div class="header-stats" id="stats">加载中…</div>
        <button class="btn-refresh" id="refresh-btn" title="刷新">↻</button>
        <button class="btn-token" id="settings-btn" title="API 设置">⚙</button>
      </div>
    </header>

    <div class="action-bar">
      <button class="btn-quiz" id="quiz-btn" disabled>📝 今日复习</button>
      <button class="btn-pending" id="pending-btn" style="display:none">⏳ 0</button>
      <button class="btn-add" id="add-btn">＋ 添加笔记</button>
    </div>

    <div class="search-bar">
      <input
        type="search"
        id="search-input"
        class="search-input"
        placeholder="搜索 — 单词、假名、释义、例句、标签…"
        autocomplete="off"
        spellcheck="false">
    </div>

    <div class="tabs" id="tabs"></div>
    <div class="tag-filters" id="tag-filters"></div>

    <div class="notes-list" id="notes-list">
      <div class="empty"><div class="em">⌛</div>加载中…</div>
    </div>

    <footer class="footer">
      <a href="https://github.com/libraosang/nihongo-notebook" target="_blank" rel="noopener">GitHub</a>
      · Built with WorkBuddy 🌟
      · <span style="color:var(--usuzumi-light);">v1.1</span>
    </footer>
  </main>

  <!-- 笔记详情 Modal -->
  <div class="modal-backdrop" id="modal">
    <div class="modal" id="modal-content"></div>
  </div>

  <!-- 添加笔记 Modal -->
  <div class="modal-backdrop" id="add-modal">
    <div class="modal add-modal-body" id="add-modal-content"></div>
  </div>

  <!-- 复习答题 Overlay -->
  <div class="quiz-overlay" id="quiz-overlay"></div>

  <!-- API 设置 Overlay -->
  <div class="settings-overlay" id="settings-overlay"></div>

  <!-- 图片灯箱 -->
  <div class="lightbox-backdrop" id="lightbox">
    <button class="lightbox-close" id="lightbox-close" aria-label="关闭">×</button>
    <img id="lightbox-img" src="" alt="场景截图">
  </div>

  <script type="module" src="assets/app.js"></script>
  <script>
    // Service Worker 自动更新：每次页面加载时主动检查新版本
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        reg.update(); // 主动向服务器请求最新 sw.js
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          newSW?.addEventListener('statechange', () => {
            // 新 SW 安装完毕后，若当前页面没有其他标签页，立即接管
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
              newSW.postMessage({ type: 'SKIP_WAITING' });
              window.location.reload(); // 重载以加载新版本
            }
          });
        });
      });
      // 收到控制权转移时重载
      navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
    }
  </script>
</body>
</html>
