<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#c4382d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="日本語ノート">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>日本語学習ノート · Nihongo Notebook</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <link rel="apple-touch-icon" href="assets/icon-apple-touch.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="brand">
        <div class="seal">学</div>
        <div class="brand-text">
          <h1>日本語学習ノート</h1>
          <div class="sub">NIHONGO NOTEBOOK</div>
        </div>
      </div>
      <div class="header-stats" id="stats">読み込み中…</div>
    </header>

    <div class="search-bar">
      <input
        type="search"
        id="search-input"
        class="search-input"
        placeholder="検索 — 単語、読み、意味、例文、タグから…"
        autocomplete="off"
        spellcheck="false">
    </div>

    <div class="tabs" id="tabs"></div>
    <div class="tag-filters" id="tag-filters"></div>

    <div class="notes-list" id="notes-list">
      <div class="empty"><div class="em">⌛</div>読み込み中…</div>
    </div>

    <footer class="footer">
      <a href="https://github.com/libraosang/nihongo-notebook" target="_blank" rel="noopener">GitHub</a>
      ・ Built with WorkBuddy 🌟
      ・ <span style="color:var(--usuzumi-light);">Stage 2 · ブラウザ閲覧</span>
    </footer>
  </main>

  <div class="modal-backdrop" id="modal">
    <div class="modal" id="modal-content"></div>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
